connection:
  url_env_var:     "QDRANT_URL"
  api_key_env_var: "QDRANT_API_KEY"
  timeout:         30
  local_path:      "data/qdrant_local"

collection:
  name:            "mental_health"
  vector_size:     384           # all-MiniLM-L6-v2 output dim
  distance:        "Cosine" 
hnsw:
  m:               16
  ef_construct:    200       
  full_scan_threshold: 10000   

search:
  ef:              200      
  default_limit:   5          
  score_threshold: 0.45        
  with_payload:    true
  with_vectors:    false

indexing:
  batch_size:      64   
  parallel:        1    
  wait:            true

payload_fields:              
  - text
  - source
  - source_type
  - section
  - tokens
  - chunk_id